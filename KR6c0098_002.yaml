body:
  text: 能淨業障分第十六言持誦此經之人雖宿世罪孽重大由經力故即能消滅而證道果詎不重哉復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道此佛顯經能滅罪愈見力用之大故承上章之意而復告須菩提曰若善男女等能持誦此經者宜為天人欽敬矣乃或反為人輕賤者何哉良以是人先世曾作惡孽應招惡果倘非今世聞經生信賴此持誦功德作一大轉機便應墮入地獄餓鬼畜生三惡道中豈僅為人輕賤而已哉以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提然是人以今世為人輕賤之故其前生所作罪孽冥中即為之消除滅盡且不惟滅罪又能得證無上覺法則此經之功力豈淺鮮哉須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者他音拖阿僧祇華言無量那由他華言一萬萬佛又引己昔供佛功德以證持經之勝故呼須菩提曰我記過去之世經無量長劫於本師然燈古佛已前得遇無數諸佛我皆供養奉事斷無空過而不供奉者其為功德固亦多矣若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及承上而言事佛之功德雖多然若有人於末劫世信根愈薄經道漸滅之時能持誦此經則可期證悟而所得功德以我供養諸佛之功德視之雖百千萬億分終不能及其一分乃至無可比數之分數亦不能及其一分也極言持誦功德之多非他功德所能彷彿也須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心則狂亂狐疑不信佛呼須菩提曰我頃所言持經功德第略言之耳若善男女等於末世時有能持誦此經者其所得功德我若如寔而言者或人不明此中道理驟聞斯語其心必驚駭狂惑反增迷亂而狐疑不信焉所謂可為知者道難與俗人言也狐疑者狐性善疑冬日渡河行於氷上但恐氷薄沒水先往河邊聽水無聲往返數四然後乃渡故曰狐疑須菩提當知是經義不可思議果報亦不可思議佛既歷言此經之勝因復呼須菩提曰汝當知此經妙義無窮非淺根智人所能測識彼持誦者即得善果福報若謗毀者必得惡果業報其為果報皆不可以心思而計議者焉可以慎諸究竟無我分第十七言大乘正法無得無說乃為究竟又豈有我人等相而為正法哉爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心是時須菩提以在會聽法之人及後之求道者於佛說住心降妄之法恐未盡明了故復白佛曰善男女等若發求無上正等正覺之心者其真心應如何住著妄心起時如何降伏此乃一經之要故不憚煩𤨏再申問答欲使羣疑盡釋無礙修途而慈悲普度之心亦可見矣佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切眾生此佛以志求大乘者須發大心故告須菩提曰善男女等發無上道心者常生如是之心而度脫一切眾生此即降住之法也盖二乘之人惟求自度悲心不普志求大乘者自雖未度先須度人是為菩薩發心滅度一切眾生已而無有一眾生寔滅度者言善男女等雖已度脫一切眾生則願非虗設而其心乃不自居功並不見有一眾生為我滅度者此為如是生心何以故須菩提若菩薩有我相人相眾生相壽者相則非菩薩夫彼度生而不以眾生之為我度者何哉須菩提當知若菩薩存一度生之念則有我人等四相而即非大乘菩薩矣所以者何須菩提寔無有法發阿耨多羅三藐三菩提心者所謂菩薩度生而不執相者何哉須菩提當知此無上正法寔無有生法執而能發無上覺心者盖執相求道終難成就也須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不佛欲人諦信法無得心故又引己事以質須菩提曰於汝意中以為何如耶我昔於然燈佛所曾為有法以證得無上道否不也世尊如我解佛所說義佛於然燈佛所無有法得阿耨多羅三藐三菩提須菩提因佛問而知法由自悟無法可使之然故即以不也答之而稱世尊曰如我解悟佛所說意我佛於然燈佛所寔無有法能得此無上覺法者良由自悟耳佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提佛以須菩提答辭深契其旨故丞是之而又呼之曰我昔於本師處雖云得法亦乃得無所得非有別法而為得無上覺也須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛則不與我授記汝念來世當得作佛號釋迦牟尼授記者授與預記將來得果也釋迦華言能仁牟尼華言寂滅寂滅為體即是如字能仁為用即是來字佛呼須菩提曰我昔若有別法而能得無上覺者我本師即不與我受記而云汝於來生當得成佛號曰釋迦牟尼盖惟受記者可見授受之間得無所得非有秘傳也若有絲毫作為決非大乘正法矣以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼夫以我寔無別法而成無上覺之故是以本師與我授記而言曰汝於來世必當成佛而號釋迦牟尼焉何以故如來者即諸法如義昔本師以我佛號為釋迦牟尼者何故哉盖釋迦牟尼四字義亦譒如來而如來者即諸法如如自然之意人胡不顧名而思義哉若有人言如來得阿耨多羅三藐三菩提須菩提寔無有法佛得阿耨多羅三藐三菩提言人若以我承師授記皆云得法因言我真得無上覺法者須菩提當知我之所得不過自心明了僅有得法之名寔無得法之迹是故名之為得無上覺也須菩提如來所得阿耨多羅三藐三菩提於是中無寔無虗須菩提當知我得無上覺法於此中問非有寔迹而真為有得亦非虗語而絕無所得盖此中道理明者方知言有言無總成戲論是故如來說一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法是以如來為汝等所說一切法語雖無定向然皆應機設施引人入勝則所說者無非佛法須菩提當知我之教人所言一切諸法不過隨其根器而導之雖一音異演聞解各殊寔無二致非比一切凡外之法各有差殊但以方便演說種種譬喻是故名之為一切法也須菩提譬如人身長大此如來更示離相之意故呼須菩提而詰之曰假如我所說人身如須彌者其身長大否耶須菩提言世尊如來說人身長大則為非大身是名大身須菩提知佛問意故稱世尊而言曰我如來所說人身長大者乃色身之大終屬幻妄不寔非若法身常存不壞故雖大而為非大身然色相宛然是則名之為大身耳須菩提菩薩亦如是若作是言我當滅度無量眾生則不名菩薩佛以須菩提所言大身之意深契其旨故呼須菩提而告之曰菩薩之人雖志在度生亦當如視大身之虗妄而不存度生之見若作是言而云我當滅度無量眾生則其心為有生可度便成執相是則不得名為菩薩矣何以故須菩提實無有法名為菩薩所謂著相度生不名菩薩者何哉須菩提當知菩薩之人雖有修證而不執法相是則名之為菩薩也是故佛說一切法無我無人無眾生無壽者是以我常為汝等說一切佛法皆應遣著而不存人我等見方為正法須菩提若菩薩作是言我當莊嚴佛土是不名菩薩夫菩薩度生既不應執相則莊嚴亦不應著相也須菩提當知若菩薩而云我當莊嚴佛土者是即不得名為菩薩矣盖莊嚴淨土者乃自淨其心不生執相斯為莊嚴自心佛土若著意莊嚴與夫建立塔廟種種裝飾皆不得謂之莊嚴也何以故如來說莊嚴佛土者即非莊嚴是名莊嚴所謂著相嚴之非者何哉盖我所說莊嚴佛土者但有莊嚴之名不存莊嚴之迹是即名之為莊嚴也須菩提若菩薩通達無我法者如來說名真是菩薩須菩提當知度生為利他莊嚴為自利菩薩之人既能自他俱利而不執相矣然大患莫若於有身世間眾生皆因心存我見遂生出種種妄執不能脫離是有我累之也若菩薩能遣著我執人我一如即為通達無我法者我說是人可名之為真菩薩矣盖求道之人要人欲淨盡斯天理流行若有絲毫罣礙即難期開悟矣有心斯道者先須無我一體同觀分第十八言如來大慈等觀一切不存私己之心不作輕人之見至公無私故得證窮法界須菩提於意云何如來有肉眼不如來所證五眼六通逈超儕輩雖菩薩亦不能究其極而其所以然者第以平等心而行普度行耳故呼須菩提而詰之曰汝意以為何如耶如來色身有肉眼否如是世尊如來有肉眼須菩提以如來色身現在故即是之而云如來有肉眼但如來肉眼雖若無異於人寔不異而異耳須菩提於意云何如來有天眼不如是世尊如來有天眼佛復問須菩提而言如來有天眼否須菩提以佛五眼具足故以有天眼答之須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼歷問諸眼須菩提皆答無異辭就所見而言耳若佛五眼觀照之境則非須菩提所能知矣華嚴經云五眼者肉眼見一切色天眼見一切眾生心慧眼見眾生諸根境界法眼見一切法相寔相佛眼見如來十力又古德偈云天眼通非礙肉眼礙非通慧眼惟觀俗法眼了知空佛眼如千日照異體還同此之五眼通該十界而優劣有殊若如來五眼則皆佛眼也須菩提於意云何如恒河中所有沙佛說是沙不如是世尊如來說是沙佛欲設喻眾生妄心之多故先以恒沙詰須菩提曰如恒河中所有之沙佛亦云是沙否須菩提以沙見無異故即是之而云如來說是沙須菩提於意云何如一恒河中所有沙有如是沙等恒河是諸恒河所有沙數佛世界如是寗為多不此佛以世界喻妄心之多也故呼須菩提而詰之曰汝意以為一恒河中所有之沙數一沙復作一恒河設佛世界如眾恒河沙數之多亦曾為多否甚多世尊須菩提以恒沙世界且多不可量況眾恒河沙之佛世界乎故以甚多答之佛告須菩提爾所國土中所有眾生若干種心如來悉知佛以須菩提既答世界甚多之語故復告之曰爾知佛世界如眾恒沙之為多矣抑知爾國土中眾生之妄心更為多否夫一人之妄心既爾眾人之妄心無窮尤為不可數計但彼等雖具若干種心我以佛眼觀之悉皆知見盖眾心雖多無非妄耳何以故如來說諸心皆為非心是名為心所謂眾生諸心我能悉知者何哉盖我說彼等諸心無非私妄皆不得為真如之心然真妄皆出於一心是亦名之為心耳所以者何須菩提過去心不可得現在心不可得未來心不得夫我所謂眾心非心者何哉須菩提當知真妄雖殊總不出過去現在未來三種心量然過去心已過隨滅現在心念念遷謝未來心尚屬未至當從何處覓心耶奈眾生不知此理隨逐妄念變幻流轉以故心念之多無有窮極是為生滅法若任念起心不隨之則念而無念無念而念縱有三心萬念不能為礙矣思之法界通化分第十九言佛心平等遍法界中無不流通度化若以寶施福德而入無相之心則三輪體空此法界之所以通化也須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不此佛又舉寶施獲福轉眼成空且與心性總無交涉欲勉人人修途也故呼須菩提而詰之曰汝意以為何如耶若人滿大千世界七寶而為施者是人以寶施因緣其得福曾為多否如是世尊此人以是因緣得福甚多須菩提以世間福報計之則此人以寶施之多其得福固應無量矣故以甚多答之須菩提若福德有寔如來不說得福德多佛以寶施獲福雖多於心性毫無關涉故呼須菩提曰此寶施福德終成幻妄若於心性寔有所濟則如來不謂之得福多矣盖寶施之福僅得世間福報耳修行人所不取以福德無故如來說得福德多緣以寶施福德於心地工夫毫無寔濟是以如來僅謂之得福多也然福報雖多終有窮竭則區區享受又何足云佛盖勉以勤修出世功德毋徒種世間福德也離色離相分第二十言人欲見佛時須離色相求之若見自性如來方為真見不當於色相而求真佛也須菩提於意云何佛可以具足色身見不佛恐人昧於自心即佛自心是佛之語而於色相上覓佛故呼須菩提而詰之曰於汝意中以為何如耶人若欲見佛可僅於其足諸相之色而見之否不也世尊如來不應以具足色身見須菩提聞佛問辭而知色身覓佛非法身真佛故以不也答之而言欲見如來不當僅以具足色身而見之也何以故如來說具足色身即非具足色身是名具足色身所謂不可以色身見佛者何哉盖如來所云具足色身即非可僅以色身而云見佛也別有法身存焉但今色相宛然是亦名之為具足色身而已須菩提於意云何如來可以具足諸相見不佛又恐人以見佛相好即云見佛故又呼須菩提而詰之曰於汝意以為何如耶如來色身有三十二相八十隨形具足諸相見此相者名見佛否不也世尊如來不應以具足諸相見須菩提以見佛相好不名真見故仍以不也答之而言欲見如來不當僅以具足諸相見之也何以故如來說諸相具足即非具足是名諸相具足夫不可以諸相見佛者何哉誠以如來所說諸相具足者係色身佛非法相之具足也然身相具在是亦名之為諸相具足而已此言欲見佛者不當向外馳求須尋自己法身真佛方名真見若但見佛相好於己無益非說所說分第二十一言如來說法說而無說總無寔法與人聞之者不當僅記言說自無心解以塞悟門也須菩提汝勿謂如來作是念我當有所說法莫作是念佛恐人僅記佛語不事參求如聖門學者多以言語觀聖人故呼須菩提而告之曰我常向汝等說法乃欲汝等解悟也若既解悟法亦應捨汝慎勿謂如來曾作是念而云我今當以何等法語說與汝等使汝等服膺弗失我初寔無此念汝等切勿作此見解盖法因人設但隨地解說非有一定成規而為說法也何以故若人言如來有所說法即為謗佛不能解我所說故所謂汝莫作如來說法之念者何哉盖人若言如來有何定法說與人者此人便為謗佛以其未能解我所說法之故也須菩提說法者無法可說是名說法須菩提當知說法者初無定法可說不過隨在去其粘著是即名之為說法耳又佛說法四十九年未曾道著一字隨說隨掃不落寔迹是謂說無可說爾時慧命須菩提白佛言是時須菩提聞佛說此經去其疑滯解證甚深上堪紹佛心宗續佛智慧下能開示眾生頓超生死故稱慧命又道法集於厥躬寔眾生之慧命也世尊頗有眾生於未來世聞說是法生信心不須菩提以自發信解得聞妙法故稱世尊而言頗能有眾生於未來之世去佛漸遠而得聞此法能生信受之心否盖逆知後來眾生鮮能發正信之心也佛言須菩提彼非眾生非不眾生佛因須菩提之問而言未來眾生驟聞此法固未必盡能信受然必有大心眾生忽聞正法便發信心勤修解證但此眾生者寔非等閒之人然現處眾生之中則又不得謂之非眾生也何以故須菩提眾生眾生者如來說非眾生是名眾生所謂眾生非不眾生者何哉盖稱彼信心眾生為眾生者寔則我說此人為非眾生矣盖其既發信心自能修行證果但現未離儕類是亦名之為眾生耳無法可得分第二十二言學佛者雖有得法之名寔無得法之迹盖法無可說則亦得無所得也須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶須菩提既悟無得無說之旨而復設此問者恐在會及後之聞者尚滋疑議故白佛而稱世尊云我佛在本師處所得無上正等正覺之法寔為得無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提佛以須菩提問意深合無得無說之旨故亟是之而又呼之曰我昔於此無上正法乃至毫髮之間并不存有所得心亦無所得之迹但寔有所證是特名之為無上正法耳淨心行善分第二十三言菩提正法一切平等不生分別自得證悟是以清淨心而行善也復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提此佛承上章而告須菩提曰此菩提正法一切平等並無高下依此而修是即名之為無上正覺之法矣以無我無人無眾生無壽者修一切善法則得阿耨多羅三藐三菩提所謂是法平等者以不存人我等見不生分別如是而勤修一切大乘正善之法即得無上正等正覺之法矣須菩提所言善法者如來說即非善法是名善法佛以頃言修諸善法之語又恐人心存取捨之見故呼須菩提曰所謂善法者如來非教人以善法而執持不捨之謂葢雖奉行眾善而其心若行所無事是則可名為修善法者矣佛所說法都無所著往往如是學者能體此意以修則庶乎幾矣福智無比分第二十四言受持此經者其福德智慧無可比論也蓋行持精進終至證果永享法樂其福智詎有涯哉須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施一小世界有一須彌大千世界則有百萬須彌矣須彌為眾山之長故稱山王佛呼須菩提曰若大千世界中所有諸須彌山以七寶堆積亦若如是之多設若有人以此而持用布施則其福德應無量矣若人以此般若波羅密經乃至四句偈等受持讀誦為他人說於前福德百分不及一百千萬億分乃至算數譬喻所不能及言寶施之福固無量矣然若有人持誦此經雖至僅持四句偈而復為人解說者視彼寶施福德縱百千萬分以至無可數說之分終不能及此持說之一分也寶施福德不及持說佛屢言者良以鈍根眾生信心難發我佛大慈故不惜叮嚀數四以啟發之普度之心益滋切矣化無所化分第二十五言如來雖化度羣生而不見有生之可度是無我人等相也故云化無所化須菩提於意云何汝等勿謂如來作是念我當度眾生須菩提莫作是念佛又恐人以如來願存普度遂疑為有意之為故呼須菩提曰於汝意以為何如耶汝等慎毋謂如來隨類度生即心存是念而云我當度盡眾生須菩提當知如來度生不見有生為我所度汝切莫作是念而云如來有意度生也何以故寔無有眾生如來度者若有眾生如來度者如來則有我人眾生壽者所謂汝莫作是念者何故哉蓋如來說法度生亦惟令自修自度而我不與焉是則非寔有眾生為如來度者若見有生為如來所度則既見有生即見有我我人生壽四相宛然既有四相則亦不得謂之如來矣須菩提如來說有我者則非有我而凡夫之人以為有我佛以頃說如來無我之見恐人疑佛說法時亦有爾我之稱故呼須菩提曰如來常時為汝等說法所稱有我者係泛指人我之辭非確有我見也乃凡夫不悟遂為寔有真我我見既生則人等諸相熾然俱生因而真性日漓去道愈遠我見害之也須菩提凡夫者如來說則非凡夫須菩提當知彼凡夫者在如來等觀一切亦不以凡夫視之況能回心向道則初發心時便成正覺尚得以凡夫目之哉法身非相分第二十六言法身乃非相之相逈出有無非若色身可執相而求若以色相覓佛則失之矣須菩提於意云何可以三十二相觀如來不佛呼須菩提而詰之曰人可即以三十二相好而觀如來否佛前已設此問今復申問者恐人疑心未盡欲因須菩提之答以釋群疑也須菩提言如是如是以三十二相觀如來須菩提以佛先問色相見佛之語曾答以不可以三十二相見如來矣然如來色相現在彼欲瞻仰金容者未嘗不即此而觀之揆其答意特謂觀望之觀非謂觀心覓佛之觀也故云如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王則是如來須菩提答意佛固知之但恐人仍著相求佛而不覓法身亦復何益故又折之曰若以相好觀如來者則輪王所修福德亦具三十二相即可謂之如來矣轉輪王掌管四天下者須菩提白佛言世尊如我解佛所說義不應以三十二相觀如來須菩提領解佛旨故稱世尊而言如我解佛頃所說義自不當以三十二相而觀如來矣爾時世尊而說偈言若以色見我以音聲求我是人行邪道不能見如來是時世尊以須菩提既答離相觀佛之語乃繫以偈辭引申其說曰若人於睹色聞聲中欲求見我者則為邪見而行邪道矣尚得見如來哉盖色聲覓佛愈覓愈離故中庸亦以聲臭俱無為至也但聲臭俱無時是何景象有識之者否無斷無滅分第二十七言佛以此經一往破相恐成斷滅故於此揭明并不離相以見真空不空非竟斷滅也須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提佛以此經一往破相而前分又折須菩提相好觀佛之語特恐人不悟其旨即落空亡而成斷滅故於此呼須菩提而告之曰汝勿以我說離相之故遂成斷滅之見便謂如來并不以具足相而得無上正等正覺之法也惟當一切不著一切不離方為中道甞見別本有將如來不以具足相故兩句中不字刪去者盖謂此經以破相為宗不當於此又說有相自相拂戾不知如來說法不偏不倚不落有無亦不廢有無方成圓義若將此處不字刪去則全經但說空義無不空義便墮偏枯且與下文不說斷滅相語不相呼應故此一字寔全經之關鍵可妄刪乎附辨於此明者自知須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提此重言之辭也故呼須菩提而云汝切莫作是念謂如來不以具足相而遂成正覺也須菩提汝若作是念發阿耨多羅三藐三菩提心者說諸法斷滅莫作是念佛又呼須菩提曰汝若作此念則發無上正等正覺之心者便說一切諸法悉皆斷滅者矣汝慎莫作是念又叮嚀之也何以故發阿耨多羅三藐三菩提心者於法不說斷滅相所以教汝莫作此念而成斷見者何哉盖發此無上正等正覺之心者於菩提正法決不說有斷滅之相若法有斷滅又何云無上正法哉不受不貪分第二十八言菩薩雖修眾善而不存欲受福德之心惟不貪故功德轉勝也須菩提若菩薩以滿恒河沙等世界七寶持用布施佛呼須菩提曰若有菩薩以恒沙世界之七寶持作布施其所得福固應多矣以喻無相求道功德無比也若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德若有他菩薩知一切法從因緣生緣生無性無性故無我無我則諸相都無所著如是而修必成正覺原其所以得成者其得力處全在一忍字上下手盖一切無諍則貪私易去私去則明明則覺生而至於道矣是此菩薩所修見性功德不遠勝於前菩薩所得寶施之功德哉此曉人以毋貪有漏福報而不修見性功德也何以故須菩提以諸菩薩不受福德故所謂性修功德勝寶施者何哉須菩提當知緣此諸菩薩所修持曾無貪受福德之心故勝於彼也須菩提白佛言世尊云何菩薩不受福德須菩提聞佛不受福德之語便疑為拒而不受之意故白佛而稱世尊曰菩薩修為何故不受福德耶須菩提菩薩所作福德不應貪著是故說不受福德佛以須菩提誤會不受福德之意故呼而告之曰菩薩所作福德非必拒而不受但不應心生貪著是故說不受福德也然惟不生貪著而受福愈多矣威儀寂靜分第二十九言佛法身清淨寂滅無為無有去來坐臥之相不當於此而覓如來也須菩提若有人言如來若來若去若坐若臥是人不解我所說義此佛重言法身非相以結之也故呼須菩提曰若有人言如來不可以色相見者何今來去坐臥四威儀中睹佛身相非即如來在是哉然此特色身佛非法身佛也但睹此相不求見性於己何益我謂是人終不解我前所說無相之義也何以故如來者無所從來亦無所去故名如來所謂是人不解我說之義者何哉盖如來者寔無來去之相如如而住故名如來曷不顧名思義而求正見乃欲於色相求之其可哉一合理相分第三十言世界之大亦屬眾塵和合而成幻妄不寔故云塵世乃凡夫不了以為真寔是不知一合相之義耳須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵眾甯為多不佛謂世界微塵均屬幻妄恐人以塵界宛然遂為真寔故呼須菩提而詰之曰今之世界皆眾塵和合而成若有善男女等以三千大千世界析為微塵汝意以為此微塵之數曾為多否言執相而求則塵多無數盖以微塵喻妄念之多也人若生心著妄則妄念愈多苦任其起滅而心不隨之則妄念雖多亦不能為我害矣須菩提言甚多世尊須菩提知佛問意謂若以世界微塵而論則不勝其多故以甚多答之何以故若是微塵眾實有者佛則不說是微塵眾所謂塵多者何哉盖眾塵幻妄生滅無常若以眾塵之多而計其寔有者佛則不說為微塵眾多矣盖眾塵雖多與我無與也所以者何佛說微塵眾則非微塵眾是名微塵眾所謂塵非寔有者何哉盖佛說微塵眾多者并不著有微塵眾多之相但塵相宛然是亦名為微塵眾多而已世尊如來所說三千大千世界則非世界是名世界須菩提因論微塵之幻妄并推言世界之非真故稱世尊而言所謂幻妄不寔者不獨微塵之小為然也即世界之大亦是積塵所成不可便認為真寔不壞但今世界宛然是亦名之為世界而已盖惟真性乃歷劫常存其他有形之物終有壞時故云非寔乃世人不知率皆認幻成真遂成倒見何以故若世界實有者則是一合相如來說一合相則非一合相是名一合相所謂世界非真者何哉若以世界為寔有者不知其為眾塵和合而成即是一和合之相也故如來說此一合相亦不存一合相之見但既有此相即亦名之為一合相而已須菩提一合相者則是不可說但凡夫之人貪著其事佛以須菩提所答深得無相之旨故復呼而告之曰所謂一合相者不惟不當見為真寔并不容有言說但世之凡夫不明此理遂以塵界為寔有而心生取著以致種種塵勞紛然並起儼如塵霧障天而失其清明但得心不附物則物不礙人而清光又大來矣知見不生分三十一言修行人當淨除一切知見乃至正法亦不應生心取著是為知見不生須菩提若人言佛說我見人見眾生見壽者見須菩提於意云何是人解我所說義不此佛申言離相之說以結經也盖相粗而見細故稱見焉佛呼須菩提曰若有人言佛為汝等說法每稱為我人生壽四者之見但四見之宜去取是人恐未能知須菩提汝意謂云何是人果能解我所說四見之義否盖欲因須菩提之答而證之也不也世尊是人不解如來所說義須菩提知佛問意故即以不也答之而復稱世尊曰我識是人寔不解如來所說四見之義也何以故世尊說我見人見眾生見壽者見即非我見人見眾生見壽者見是名我見人見眾生見壽者見所謂是人不解佛說之義者何哉盖世尊所說我人生壽之見者謂是見應捨而不應執是則名為我人生壽之見耳須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相佛以須菩提所答深合問意故又呼之曰所謂是見非見者不惟四見應離即發無上覺心者雖云求道而於一切正法但當如是而知如是而見如是而信心解悟不生分別於其間并不生執法之心而成法相焉如是解見前須菩提所言法相者如來說即非法相是名法相須菩提當知所謂法相者以不應取執生相便非法相若生取執是名法相矣應化非真分三十二言佛之出世乃應以化度眾生而來然特於夢幻人世教修如幻法門勿認以為真寔事也須菩提若有人以滿無量阿僧祗世界七寶持用布施經中寶施不及持說之語言之稔矣然佛終恐人貪求福報蔑視修持故於此特再言之以結全經其叮嚀之意深矣佛呼須菩提曰設若有人以布滿無量無數世界之七寶持用布施者所施之多又遠勝於大千矣其所獲福亦應多甚然寶施之福雖多終有窮極若有善男子善女人發菩提心者持於此經乃至四句偈等受持讀誦為人演說其福勝彼言彼寶施福德固為多矣若有善男女等發無上覺心而受持此經乃至僅持四句偈等既自行持又為人演說經義則其福德已超勝於彼寶施者矣演說視解說為尤細云何為人演說不取於相如如不動所以為人演說經義者果何如哉惟當一切不著不涉名相而真性圓明常自如如湛然不動無有去來生滅之相如是而說即為善於演說庶使聞者皆獲益焉何以故一切有為法如夢幻泡影如露亦如電應作如是觀所謂說法不取相者何哉盖涉於名相是世間法非出世法世間為有為法斯有為法是假非真如夢境之空如幻變之妄如水中泡旋起旋滅如鏡中影忽有忽無如曉露之易乾如電光之倐滅此有為法如此六事如是而觀方為正觀若他觀者名為邪觀學者尚其審之佛說是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所說皆大歡喜信受奉行佛說此經已畢斯時在會之長老須菩提及出家僧尼在家居士為優婆塞婦女為優婆夷并一切世間之天人修羅等聞說此經悉皆證悟乃大歡喜而信心虔受遵奉行持焉夫當時之聞經者既各獲益以去矣所願盡未來際若聞若見共證菩提是所深願
