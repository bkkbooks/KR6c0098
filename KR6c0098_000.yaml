front:
  text: 萬靈蠢蠢率皆以無上道作文字解吾佛惺惺即以文字發明心地說三藏十二部經大包法界細入微塵謂太虗在人心中只如一塵一毫毛裡有無量佛世界佛之大慈於大千世界中無一物不度必至度盡眾生而後已大哉法王不圖復有此五千四百卷不可思議之無量法寶也經來東土已數千年至今盛行於世者無如金剛經誠以此經言簡義精乃反約之道也愚常於參究之下拜讀是經不啻完如渾璞細若剝蕉盖以人欲盡淨而天理流行剝盡蕉心方覺妙手空空乃洗心之一大法也金剛經又稱功德經夫人自無始以來重重冤親罪福宛如春蠶作繭自纏自縛永無脫離此經若於蠶以抽絲忽然頓斷與人解粘去縛現出自性天真便是超凡入聖一大轉機而冤親亦解釋平等矣愚於童時讀此經至如是住如是降伏其心恍然有會嗣讀古德註解有訓如是即道者有謂指下文言者二俱無過第禪宗以道在心解不在於語言文字我佛說法四十九年不曾道著一字却字字皆開示悟入之機在善會者於心行路絕言語道斷時如人飲水冷暖自知哭不得笑不得方是善讀經者但此可與知者道未可以概語人也同參謝子於此道得印心焉愽綜羣經十餘載自信見道親切且當仁不讓於是發擔荷心即以掛壁之口摩空之手註成金剛經易解一部見示第見其語語妙諦字字真詮開人悟入之機如穿成一串摩尼實有點睛破壁之妙又如無縫天衣圓轉無痕真古今一大快事而不愧為易解者矣苟得此而讀之未悟者可由之而見道即已悟者亦可藉此以證明默識心通人牛不見將見四相俱遣不啻衣珠在手即紹佛鎡基道統有在自當慶快平生卓絕今古矣世有識者必不以愚言為河漢也是為序光緒己丑莫春珠浦南宗後裔來雲子唐養愚譔余於內典素未宣究初不知其道為何如也迨槖筆從軍與貫三謝子共事一方晨夕清談多所啟發稔為出塵之士而非世俗常談也相從既久乃知三教大道靡不精研貫徹而於釋氏經論尤深造焉始恍然其含光隱耀淡然寡營者良有以也每謂人生數十年殫精神竭智慮以愽身家溫飽虗生浪死悲苦相尋於此而不思出離殊為可惜況我輩重以劫外餘生滄桑掁觸者哉余聞之而不禁怦然心動也因取石註金剛經一部教余誦習研求自然獲益乃初閱時苾然不解雖經質問亦未了了迨行持既久昔所不解者今則解之昔所能解者今則更進一層矣久久參尋愈索愈奇心地日進乎精明方知此經之妙有不可以言語形容者大哉佛慈於大千世界中一切含靈蠢動無不普度必至普度眾生而後已誠哉是言洵非虗語第經中又謂若有眾生如來度者如來即有我人眾生壽者盖言人當見性自度佛所說經不過為人解粘去縛並無實法與人故云我所說法如筏喻者今則去佛漸遠知識難逢倘不藉經中文字以自參究亦何由自度哉余故讀經至無我相人相眾生相壽者相而知四相不除終難進益吾人妄念紛紜必須掃盡萬緣如斷一握亂絲一斷俱斷與道方有相應分又經中應無所住應如是住如是降伏其心等語大有深意須細加玩味方見洗心要法但行之既久自然天真發現有不期然而然者此非箇中人不知第經旨甚深非藉指示猝難領解今謝子以慧心慧性十餘年精參默契造詣功深一旦發擔荷心即用點睛之手註成金剛經易解一部言雖淺近而於圓通妙諦指陳簡要真足開人悟入之機而使後之學者共得津梁同登覺路實古今來一大快事普願見聞同修同證他日靈山會上共結善緣蔗不負一片婆心為先導耳余久借他山深資麗澤茲因經註梓成故略敘其緣起佈告同人以共慶云光緒己丑莫春月上浣真州圓覺居士劉紹南敬序金剛經者乃諸佛之心源眾生之慧命也故其指陳心法簡要詳明掃盡浮詞獨標正覺盖自佛法西來從上單傳之旨莫不以此為入道之梯航誠法寶也迨臨濟諸公出而創禪機施棒喝不立語言直指見性一切經典直欲束之高閣雖若別開生面寔由參學之流不務觀心徒事向外馳求致蹈說食數寶之譏故令暫息外緣使之斬斷葛藤真常獨露特救一時之弊耳是則非經之過而不善誦習者之過也故在唐時此經註解已有八百餘家誠以此經為入道之梯航而研心之先務也顧諸註或出或沒或存或亡不復并見於世今所存者尚數十家如天親菩薩及諸大德論註或禪或教闡揚佛旨無不曲盡精微各臻其妙但其詞意幽深殊非初機所易曉今此經遍海內幾於家誦戶習然欲求其暢明宗旨由之入道者卒不多覯豈非以甚深般若研窮不易而又乏導引之具歟近世惟石天基先生註解此經最為詳盡但覺迂拘未易使人頓悟僕於此經夙耽誦習暇輙搜求旨趣又得益友切磋故雖資性庸愚亦似微有所得爰不揣固陋註成全部顏之曰易解於中頗復引申圓義或者謂此經屬頓教所攝今乃附麗于圓宗不與古判相剌謬乎然法華稱三獸渡河三車出宅法無二致殊異在人讀是經者苟能默契旁通則由頓入圓非為分外凡所註詞除訓詁故寔外悉皆自抒管見概不拾人牙慧標窃貪功一切經論亦不敢繁稱博引使人易生煩厭而窒靈機有志探元者或可藉以當老馬之助焉特是聞見寡陋矢口談經不免妄言之咎倘有高明辱而教之則幸甚光緒十五年歲次己丑三月之望毗陵居士謝承謨貫三氏序緒言此經古德判為頓教以其直指菩提別無支蔓故耳又以一門深入不偹諸行故特謂之頓而不謂之圓愚謂此經頓而兼圓何則經中雖一往明空而復云於法不說斷滅相夫斷滅不存乃中道也中即圓義又云如來所得阿耨多羅三藐三菩提於是中無實無虗無實無虗則有無不立有無不立即非有非無非有非無即有無兼該有無兼該即雙照雙泯乃至離即離非是即非即開權顯寔即實而權為實施權即權而實是則頓中有圓也至如佛說第一波羅蜜即非第一波羅蜜是名第一波羅蜜三句之類經中甚多若從而推廣之則三句而亦涵四句之義非頓而兼圓乎四句謂有句無句非有非無句亦有亦無句第以一門頓入不具諸法僅得謂之兼圓而不得謂之純圓也然准台宗四教謂般若帶通別明圓則兼圓之說為不誣矣總之法無定向深淺由人智者見之謂之智仁者見之謂之仁是在當人領會耳台宗四教謂藏通別圓也依教修觀此經觀法具偹層次井然前云凡所有相皆是虗妄若見諸相非相即見如來此即空觀了知一切皆空法亦如幻故繼云汝莫作是念如來不以具足相故得阿耨多羅三藐三菩提此即假觀了知一切名相從緣生故又云如來所得阿耨多羅三藐三菩提於是中無寔無虗此即中觀了知色即是空空即是色一即一切一切即一故若欲習是觀法而能從空入假由假明中過去現在未來三心難覓我人眾生壽者四相都融心心印心念念非念便得中道了義是則由淺入深漸趨中道即頓中有漸也佛法大海信為能入故云信為道源功德母信能長養諸善根如經中較量功德多寡及微塵世界之類寔實非誑不可以我所未經聞見便認為甚言之辭試思金口誠言豈有虗假縱一時未能悟徹斯理亦須諦信不疑自有一朝渙然氷釋到此地位方知佛語非誑善願同仁各宜深信凡夫畏空執有二乘厭有取空畏空執有謂之常見厭有取空謂之斷見又通謂之倒見執有執空兩俱成病此經為開示利根凡夫故先破其執相而節次較量功德以顯有為福報終遜無為離相布施逈超著相又恐學人棄有取空故復䇿之以不落兩頭直超無上盖斷常終成凡外而離相頓證無生何去何從孰得孰失理自易明我輩何幸而獲聞此妙法能無努力進修以毋負佛慈諄諄明誨讀經先要明宗盖一經自有一經宗旨倘宗旨不明則馳騖無歸如此經以無住為宗但了得無住之旨便為已得要領其他多說少說皆餘緒矣又佛所說法多於要妙處圓轉如環似無端倪可尋讀經者徃往於圓轉迴環之處茫然無據己眼不明且稱為有意搬弄者所謂正言似反也不知無上大道其要妙正在圓轉處若不如是說其理終不圓明宗旨若明則於迴環層叠之處縱使羣山萬壑自能理會而不為所迷讀經以明心為上明心以解義為先至於持誦經文不求解悟祇可薦亡滅罪作得世間功德而已若悟法明心則頓超三界永除後有且歷劫冤親悉皆度脫顧不偉哉是則欲明心地講義不可以不先由有言以迄無言自不覺而成正覺理固然也惟夙根深厚一聞千悟者不在此例然民鮮能之讀經非他書可比餘書惟看讀一過略能記其梗概便可不須再讀讀誦大乘經典自非聖人決不能過目便了必須細心玩味默意參尋其義乃出始則因註而明講解繼則并不需註一意深參久久自發現行所謂制心一處無事不辦到得一旦豁然之後方知此中妙義無窮真如飲水冷煖自知并不能吐露向人是為祇可自怡悅不堪持贈君也既得一經悟徹然後更誦他經自不勞迎刃而解講解儒書必有一定之理不可移易而佛經則不然要當不泥不背是以難耳故古德云依文解義三世佛冤又云離經一字便同魔說讀者能於不泥不背中有個入頭處識得眉橫鼻直方可與讀是經經旨甚深猝難曉解註經者若更加以奧衍之辭仍未能了了而不便初機是以今註概從簡易讀者取其意而略其文可也矧讀經惟求印證何暇旁求迨至脫然契證能所兩忘恍如雪山中夜忽睹明星相似方知窮諸元辨如一毫置於大虗竭世樞機似一滴投於巨壑雖復珠玉盈前於己無益斯時則經且不須註於何有但如敲門磚子不得不借用一番耳經中較量功德及執相觀佛之說徵詰重重不厭煩𤨏有謂由淺入深故見重複有謂緣讀來聽者佛故申說之竊以為不然若謂由淺入深則細玩前後經旨其重複處無大異辭何云淺深若謂因續聽重說者則佛說三藏經典豈遂無續聽之人何不聞再三申說而獨於此經有之決無是理誠以說此希有難信之法佛以慧眼觀察眾心非經三五番申說不能諦信無疑佛特知之故不厭其辭之煩所以為大慈悲也又佛所言說多取證於須菩提以明見無歧異法如是故經稱持誦功德遠勝寶施者良以信心受持即是多善根福德因緣又經義若未能頓悟但得誦持不懈其義漸明自堪證悟但不可預期速效迨至悟明之後雖若經文淺顯而意義仍自無窮愈索愈深愈探愈妙即終身玩味終無止境此經之所以甚奇而持誦功德所以殊勝也至誦經須淨除塵妄一意精專字字分明斯為正軌不必定求靜室定須設像有暇即念毋待後時須知佛在心頭不在外相莊嚴也三教大道殊塗同歸實無二致經云空除四相即聖人之四絕無說即聖人之無言五戒即五常三毒即三戒人我普度即大學之明新法施均蒙即中庸之位育種種相符言難罄述顧謂佛教而有異乎至於妙道精微聖人所罕言者佛則詳言之我輩生當像季倘非釋氏之書則凡精一執中歸仁位育與夫一貫無言之旨何由而明此東坡所謂學佛而後知儒者信然此經如天衣無縫本無段落可尋迨天親菩薩始判為二十七疑如寶施者不及持說功德以須菩提反覆生疑故佛節次為之解說欲令斷疑生信也然此說非時俗所尚不甚通行今經三十二分為梁昭明太子所定然所分斷落間亦有欠妥處但於行持究屬無礙況今世俗盛行故且因之以仍其舊平寔商量禪門所忌範圍不過教義所宗今以粗淺言辭解釋甚深經旨非禪非教於意云何矧今善註多多有如珠玉盈前而安用是邱里之言為特是深文奧義難喻於里閭且法喻雖多究其指歸總以圓通為至所謂佛法無多子亦儒稱一貫之意也區區之心寔願見聞共證以勿負慈悲普度之義焉苟無乖經旨幸勿以粗淺棄之藏經極多而獨於此經亟亟講求者良由在家善信有志修持除淨土一門外莫不以此經與心經為常課誠以兩經簡潔便於行持而居家又時有塵緣紛擾若必欲遍參全藏不惟事有未遑亦且力所不逮然既持經自宜講解因解生悟自能心性開明而成正覺則受持也而可不講求哉至心經尤為直捷簡括故特附註於後以質大方吾人在塵勞中既未出離則凡治家接物一切俗緣自不能無然須念娑婆劇苦幻質無常不求出離沉淪永劫佛所說經無非教人離苦得樂離苦之要端在明心明心之法當於塵緣之暇屏除雜念澄心默坐一意精參或於平旦披衣起坐默自提撕然亦不必過於用意但令心不繫緣曰久自然有會惟不可預存期效時至自彰倘得妙趣尤當益加精進毋怠厥志自然功不唐捐而獲益無量矣有志之士請甞試之決不相賺右臚各條幸望留心不無小補貫三謹識誦經簡要人人可誦不拘官民僧俗時時可誦不拘日中朝暮洗手便誦不拘有香無香漱口便誦不拘吃葷吃素默亦可誦不拘高聲低聲少亦可誦不拘全部半部閙市中亦可誦何必靜室身到處皆可誦何必對佛無音節亦可誦何必敲魚行坐立皆可誦何必跪讀止要志虔意誠神凝氣斂耳不旁聞目無他見口不雜言心無雜念遍數頻加多多益善暑往寒來功無有間如此精專自有靈騐壽延福增災消禍散生死誰拘輪迴可斷一心不亂自然鬼服神欽真性常存何愁天塌地陷到得西方化佛迎誦經功德於茲見誦經功德感應無邊但恐人事匇忙性根遲鈍不能受持全經則四句偈等亦堪持誦具大功德經中四句偈有四無我相無人相無眾生相無壽者相一凡所有相皆是虗妄若見諸相非相即見如來二若以色見我以音聲求我是人行邪道不能見如來三一切有為法如夢幻泡影如露亦如電應作如是觀四以上四偈隨念一偈功德無邊亦能見性但得信心受持自然功德無量
