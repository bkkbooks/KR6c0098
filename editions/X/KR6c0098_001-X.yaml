body:
  text: 般音鉢若音惹後凡言般若者倣此姚秦三藏法師鳩摩羅什譯毗陵謝承謨貫三氏註釋真州劉紹南圓覺氏刊上蔣春同蘭言氏刊上錢松齡覺之氏校訂此經以喻法為名實相為體無住為宗斷疑為用大乘為教相以喻法為名者金剛喻也般若法也般若華言智慧金中之剛至堅至利能碎萬物此經能斷眾生疑執取以為喻波羅密華言到彼岸眾生在生死海中無有窮極修此般若能到涅槃彼岸經者常也法也梵語修多羅此云契經謂契理契機也以寔相為體者經云若人得聞是經即生寔相寔相即無相也以無住為宗者宗訓要經云應無所住而生其心此經多以無住破著故以斷疑為用者由經力用能斷妄執故以大乘為教相者經云為發大乘者說為發最上乘者說此乃一經宗要不可不知故首列焉若更略解經題則云人苟具堅剛之志以修行則智慧自生乘此智慧直達涅槃彼岸故云金剛般若波羅密經會心之士即此經題亦堪悟入不在見聞之多寡也法會因由分第一分去聲後倣此言此會乃說法之因緣所由起也佛與人隨宜說法解粘去縛使之證悟今大眾會集聽講故稱法會云如是我聞佛之從弟阿難從佛出家博聞強記佛說法四十九年阿難於結集經藏時錄出一字不遺故稱多聞第一此阿難言如是之法我親從佛所聞欲啟人信也一時佛在舍衛國祇樹給孤獨園祇音其一時者彼一時也佛者教主舍衛西域國名祇樹給孤獨園謂祇陀太子施樹給孤獨長者買園請佛居住乃說法處也給孤獨長者以好施孤獨得名曾在王舍城見佛聞法欲請佛至舍衛國佛令先覓住處因見祇陀太子園林蔭清幽欲以價買太子戲云須以金布滿園中即賣與長者歸輦金布滿園中太子感其誠因與園施樹共立精舍與大比丘眾千二百五十人俱比去聲後同比丘乞士也上乞法於佛以資慧命下乞食於人以資色身言大以別其小千二百五十人者恒隨佛聽法之人也自如是我聞至此謂之通序以諸經首多用此數語故佛入滅時阿難問佛一切經首當安何語佛云當安如是我聞等語非但我法如是三世諸佛悉皆如是也爾時世尊爾時彼一時也世尊謂世所共尊佛有十號此其一也食時著衣持鉢著入聲後同食時言當午前可以乞食時也佛制過午不食且自不蓄食物以去其貪使各行乞以去其驕著衣者服僧伽黎也鉢者應量器也或瓦或鐵食量各有大小鉢則各隨量置入舍衛大城乞食於其城中園在城外城中則人烟輳集之處故入城中乞食次第乞已已音以下同佛心平等不舍貧而從富不越富以就貧次第行乞使人均沾福德也還至本處飯食訖飯音反食音嗣訖畢也乞食歸來飯食已畢收衣鉢收拾衣鉢示有條理而順規制洗足已佛修苦行不使色身安於逸樂故行則跣足今欲跏趺先須洗足敷座而坐敷布也布座跏趺將以說法也善現啟請分第二善現即須菩提乃此經發起之人盖由其啟請而得普聞妙法也時長老須菩提齒德俱尊曰長老梵語須菩提華言空生亦名善現在大眾中即從座起須菩提為上首弟子解空第一今欲申問真空無相之法故從眾中起座也偏袒右肩右膝著地袒露也右肩偏露以示順右膝跪地以示敬合掌恭敬而白佛言合掌以示歸敬而啟白於佛云希有世尊希少也言少有者我世尊也未致問辭先歎希有如來善護念諸菩薩善付囑諸菩薩如來者經云無所從來亦無所去故名如來若欲廣明更有多義須菩提稱佛善能護佑調伏現在諸菩薩令其入道善以妙法付囑未來諸菩薩令其修習世尊善男子善女人善男子善女人在凡而修出世行者故名之為善須菩提問言設有善信男女於此發阿耨多羅三藐三菩提心阿無也耨多羅上也三正也藐等也菩提覺也言人若能發此無上正等正覺之心者云何應住云何降伏其心應不應之應平聲降伏之降平聲後同應當也言未知其心當何所安住而不外馳妄念來時如何降伏而不令起此乃修行至要洵切問也於時世尊入甚深般若諸根悅豫須菩提睹相知意故假申問答欲得世尊反覆辨論以申明真空無相之旨非徒自悟亦欲使在會及後之學者得住心降妄之法為下手工夫以證至道其嘉惠來學寔無量矣佛言善哉善哉須菩提問意深合佛旨故亟稱其善也須菩提如汝所說如來善護念諸菩薩善付囑諸菩薩佛呼須菩提言誠如汝適所云如來善護念付囑之語汝今諦聽當為汝說為去聲後同汝須誠聽吾當為汝言之善男子善女人發阿耨多羅三藐三菩提心若善信男女而發此無上正等正覺之心者應如是住如是降伏其心其心當如是而住當如是而降伏其妄心如是二字不可作泛語讀過是一絕妙心法即無住生心之謂非特指下文而言也故此經始終皆稱如是盖吾人心本虗靈與佛同體祇緣無量劫來妄念紛乘曾無休息由此妄念生出八萬四千種塵勞舍生受生輪迴不已無有出期佛慈憐憫因而說法度人俾得離諸苦惱頓證真如以復其本體之明然修行法要先須淨除妄念務令心不繫緣不思善惡等事因任自然如如而住從此進修自得明心見性莊子亦云虗室生白吉祥止止此為修行正軌乃住心降妄之要訣千古聖賢皆以此為下手工夫佛故亟稱之若舍此別修便成邪魔外道顧諸人於此往往輕忽看過誠為可惜茲特拈出以公同志唯然世尊願樂欲聞唯音委樂音要唯者應之速而無疑也樂喜好也須菩提聞佛說住心降妄之法要而不煩恍然契悟故亟應而然之但慮在會及後之聞者未必皆能以一二語而頓階契證故願佛更引申其說庶使聞者不致茫然無據大乘正宗分第三乘去聲後同言佛說此法乃修習大乘之真正宗要也佛告須菩提諸菩薩摩訶薩諸眾也菩普也薩濟也言能普度眾生也摩訶廣大也佛告須菩提曰若有眾菩薩及大菩薩等欲修習大乘正法者應如是降伏其心當如上所云如是之法而降伏其妄心斯可矣所有一切眾生之類眾生之眾平聲後同眾多也言菩薩既以如是之法降伏其妄心而證悟不退矣但既名稱菩薩尤應自他俱利隨類度生夫不有一切眾生在乎眾生指卵胎至無想之類佛謂輪王亦是凡夫以其未超三界尚在輪迴故概以眾生目之有謂眾生僅指一己之妄心而言者不合下文語氣且惟論自度則局於二乘而與大乘普度之旨相背故不取焉若卵生若胎生若濕生若化生卵生飛禽之屬胎生人畜之屬濕生魚龍之屬化生蚊蝱之屬又人與旁生具有四生諸天地獄中陰惟是化生鬼通胎化二生皆屬欲界若有色謂色界天若無色無色界天欲界有色無色謂之三界若有想謂色處天若無想無所有處天若非有想非想天非無想非非想處天我皆令入無餘涅槃而滅度之涅不生也槃不死也修成正果則永脫生死無餘涅槃乃如來究竟彼岸也菩薩之人惟以度生為事如上眾生之類悉皆令證涅槃妙果而度脫之此廣大心也如是滅度無量無數無邊眾生實無眾生得滅度者菩薩雖以度生為事而度脫如許不可計量之眾生然其心寔不存一度生之見而自以為功何以故須菩提菩薩所以不存度生之見者此何故哉須菩提當知若菩薩有我相人相眾生相壽者相即非菩薩有相無相之相去聲後同但知有己為我相分別彼此為人相蔑視羣生為眾生相希冀長生為壽者相若菩薩有此四相而心存分別謂之四倒是則妄念紛乘悲心不普又何云菩薩哉妙行無住分第四行音恨言菩薩於布施妙行心無住著寔無所希冀而為此也復次須菩提復去聲後同復次再告之辭也菩薩於法應無所住行於布施行如字施去聲後同住猶著也此承上章而言菩薩之人既已離相度生更宜離相行施所謂無為而無所不為也但菩薩法式應行施而不著布施之相此則三輪體空而為無住行施布施有二一法施二財施說法度人謂之法施濟人財物謂之財施三輪謂施者受者及所施物所謂不住色布施不住聲香味觸法布施在眼曰色在耳曰聲在鼻曰香在舌曰味在身曰觸在意曰法此謂六塵言菩薩所謂無住行施者不當於塵境生心也須菩提菩薩應如是布施不住於相言菩薩當以所謂如是之法而行布施心不著於塵境之相則得之矣何以故夫行施而不著相者此何故哉若菩薩不住相布施其福德不可思量思量稱量之量平聲後同盖菩薩行施而不著布施之相者其所得福德正不可以心思較量多寡矣福德猶言福報菩薩之人惟以布施為助行期於速證不應但求世間福報也須菩提於意云何佛呼須菩提而詰之曰於汝意中以為何如耶東方虗空可思量不不音否問辭也下同佛欲顯無相行施獲福之大故設言諸方皆有空處試思東方虗空之處其廣大可能以心思計量否不也世尊不音弗答辭也下同須菩提悟佛問意而知東方虗空自不可以心思量其廣大故以不也答之須菩提南西北方四維上下虗空可思量不四維四角也佛又呼須菩提而問之曰東方虗空其廣大既不可以心思較量矣若南西北方及四維上下亦各有空處其空處有可以心思較量者否不也世尊須菩提以東方虗空其廣大既無限量則他方虗空亦皆無限量故仍以不也答之須菩提菩薩無住相布施福德亦復如是不可思量佛呼須菩提而告之曰汝既知諸方虗空其廣大皆不可以心思較量矣當知菩薩不住相布施其所得福德亦如虗空之廣大而不可以思量焉顧可住相行施而僅取有為福報須菩提菩薩但應如所教住須菩提當知菩薩之人但應如我所教無住行施之法而安住其心則得之矣此叮嚀之辭也如理實見分第五言修行人當知寔相無相之理乃為如寔而見盖色身是妄若但向色身覓佛而不見心佛是不名為寔見也須菩提於意云何可以身相見如來不佛欲令人各見自心法身真佛毋徒向外馳求而昧己靈故呼須菩提而詰之曰於汝意中以為何如耶可僅以色身外相而見如來否不也世尊不可以身相得見如來須菩提悟佛問意若徒以色身覓佛必不能見自性如來故即以不也答之而言人固不可徒以色相見佛而昧法身真佛也何以故夫不可以身相見如來者此何故哉如來所說身相即非身相盖如來所說身色外相即非法身真相誠不可徒以色相而求真佛也佛告須菩提凡所有相皆是虗妄佛以須菩提既悟問意故告之曰凡一切色身外相皆是虗妄不寔所謂有形終歸壞無相乃名真也乃習丹道者專在色身上摸索縱活千年終歸於盡究何益哉若見諸相非相則見如來若人見一切色相而不存有相之見即能見真性如來矣正信希有分第六言人聞此經典而能諦信不疑是人善根深厚方得具此正信真乃希有之士也須菩提白佛言世尊頗有眾生得聞如是言說章句生實信不須菩提意謂今我等親炙於佛得聞如是之妙法固應諦信遵行第恐後之聞者未必遂能生信故啟白於佛而言將來頗復有人得聞佛說如是妙法之章句亦能不滋疑懼而生真寔信心否佛告須菩提莫作是說佛以聖賢雖不常有然佛法豈遂滅絕何可蔑視將來遂無人信受故告須菩提曰汝莫漫作是說如來滅後後五百歲有持戒修福者五百歲有五個盖言運會變遷之期也言雖如來入滅之後最後五百歲中必有大心凡夫能擔荷大乘正法而堅持戒律勤修福德者焉此如來佛自謂也於此章句能生信心以此為實是人於我今所說之章句聞之而必能生正信之心以我此言為真寔非誑當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根然此聞而生信者寔非根行淺薄之徒當知此人已曾歷劫薰修善根深厚且不僅於一佛二佛以至四五佛處種植善根而來曾於無量佛所種植善根而來矣聞是章句乃至一念生淨信者惟其善根深植故聞我說如是之章句而即生信心焉然是人則固善根深植矣抑知更有一念之頃聞說是法能生真淨信心者其所植善根亦非淺鮮須菩提如來悉知悉見是諸眾生得如是無量福德佛呼須菩提而言彼聞法生信者佛以智慧覺照盡能知見此等眾生以善根深植之故必能各如其信心而得福德皆無量矣所謂信心生一念諸佛盡皆知也何以故夫聞法生信而獲福無量者果何故哉是諸眾生無復我相人相眾生相壽者相盖此等眾生由善根深植已探法要而其心已不復有我人等四相之見矣無法相亦無非法相是人不惟不著我人等相并不於正法而生取執之相亦不以非法而生舍離之相心境如如絕無纖翳何以故夫其諸相永離者此何故哉是諸眾生若心取相則為著我人眾生壽者盖此等眾生其心若於一處而生取著之相則一著永著即為著我人等四相者矣若取法相即著我人眾生壽者言不惟餘相不應取著乃至正法雖固由之入道於此而若生取執則亦猶著我人等四相矣何以故若取非法相即著我人眾生壽者夫所謂一切離相者果何故哉盖取執即能害道不惟正法不宜取著即非法亦不宜生厭離若以非法而生厭離之心則為取非法相既有此相即亦猶著夫四相也是故不應取法不應取非法以故學道之人其心不應以正法而生取著尤不應以非法而生厭離二者皆為著相故皆不應取以是義故如來常說汝等比丘知我說法如筏喻者夫以不應著相之故故我常向汝等比丘說須知我平日為汝等說法不過為人解粘去縛曾無寔法與人正如以筏度人之喻不可便認以為真法而生取執也筏者竹簰所以濟渡經云過河須用筏到岸不須船以喻如來說法度人既已得悟法亦應舍離也法尚應捨何況非法學者於聞法悟道之後即正法尚當捨離方免礙道何況本非正法可不急捨而存計議乎無得無說分第七言如來在昔聞法證果雖有得而寔無得即今說法度人亦有說而寔無說總欲破人執相之見耳須菩提於意云何此如來反復破人著相之見故復以己躬下事示人堅人深信因呼須菩提而告之曰於汝意中以為何如耶如來得阿耨多羅三藐三菩提耶如來有所說法耶此如來佛自謂也言我在昔歷劫修行得成正覺豈真有無上正等正覺之法可得耶即今與汝等隨宜說法又豈有寔法可與人耶佛致詰辭總欲破人執著之見耳須菩提言如我解佛所說義無有定法名阿耨多羅三藐三菩提解去聲後同解悟也須菩提了解佛旨故言我今解悟佛語之意寔無有一定呆法可名之為無上正等正覺而盡人皆堪修證者盖修行證果各有時節因緣如一方決不能療萬病也亦無有定法如來可說夫既無定法可名亦自無定法可說何以故如來所說法皆不可取不可說夫所謂法無定向者此何故哉盖我佛所說之法固皆度人之具然不可心生取著而成法縛惟當心領神會不堪吐露向人非法非非法法無定相故云非法然如來說法利生普令得度不可謂之無法故云非非法所以者何一切賢聖皆以無為法而有差別差音雌自阿那含以下為賢阿羅漢以上為聖世間為有為法皆係識神用事出世為無為法因任自然無處用力差等差也言所以謂法無定者何哉盖一切出世賢聖莫不皆由無為正法而證道但其根性有淺深故證果亦有差別耳依法出生分第八謂以此經法修持自利利人即能出離羣生於濁世而徑登彼岸矣須菩提於意云何佛欲顯持經獲福之勝故呼須菩提而告之曰於汝意中以為何如耶若人滿三千大千世界七寶以用布施三千大千世界乃一佛教化之所盖一個日月運行之所為一世界如此千個世界為一個小千世界一千個小千世界為一個中千世界一千個中千世界為一個大千世界所謂三千大千者乃舉小千中千大千而言寔則一個大千世界也七寶謂金銀琉璃玻璃車渠赤珠馬腦也言若有人布滿大千世界七寶而以之布施邀福則所施甚大矣是人所得福德甯為多不甯猶詎也言是人布施如此之大其所得福報詎多否耶須菩提言甚多世尊須菩提以此人布施之大則其獲福固應無量故以甚多答之何以故是福德即非福德性是故如來說福德多福德性自性福德也盖依經修證見自本性乃為自性福德言所謂寶施得福之多者何哉但因離性布施僅得有為福德而非見性福德此乃如來所說福德多之意也若復有人於此經中受持乃至四句偈等偈音計持者執持不捨之意偈猶詩也佛言若更有人而不求有為福德惟修見性工夫能於我所說此經之章句受持讀誦雖至少而僅持四句偈等自來言四句偈者聚訟紛紜迄無定論有謂指無我相四句者有謂凡所有相四句者有謂若以色見我四句者有謂一切有為法四句者所指雖殊總不出無相之旨究有何異而必欲爭執彼此哉況此經正破執相乃於四句偈而反欲指以寔之是破相而仍著相也惡乎可或又謂佛秘而不言者是大不然試思佛說三藏十二部多方指示乃於四句偈而獨秘之有是理哉按經中凡言四句偈者上則有乃至字下則有等字細玩語意所謂乃至等者盖少之之辭言雖少而乃至四句偈耳此特泛言之也顧欲磪指以寔之不與無相之經旨相拂戾哉不可以不辯為他人說其福勝彼言若人既自持經獲益又能推己及人為人講說而化導之則修證功深自他俱利視彼寶施之福德固不侔矣盖寶施獲福固為多然徒增頑福難出輪迴譬如無量家資而坐享銷耗財雖多終有竭也持誦經文雖甚少然半偈明心頓超塵劫譬如為山累土而日漸增高力雖微終有成也兩兩相形其為優劣不待智者而明矣佛慈明誨可不信行哉何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出言持經獲福之所以殊勝者果何故哉須菩提知否自來一切修成諸佛及諸佛所修無上正覺之法無不皆從此經中流出故稱般若為佛母焉須菩提所謂佛法者即非佛法佛恐聞此經法殊勝又生法執故呼須菩提而告之曰所謂無上正覺之佛法者乃睹色聞聲各有悟入之由並非有一定死法可名之為佛法也一相無相分第九一相者諸法寔相也言諸法雖云有寔相而究無定相是不宜取執也明矣須菩提於意云何須陀洹能作是念我得須陀洹果不洹音浣下同須陀洹華言預流謂此人見惑已斷得預聖人之流也見惑謂見事物而心生計議也佛欲示人離相證道之旨故呼須菩提而問之曰於汝意中以為何如耶聲聞乘有四果初果名須陀洹證是果者其心以為我今已得須陀洹果否聲聞屬二乘謂聞說法音聲而證果也須菩提言不也世尊須菩提乃此中過來之人故聞佛問而知證是果者其心必不存一得果之心故以不也答之何以故須陀洹名為入流而無所入須陀洹所以不存得果之心者何故哉盖須陀洹但有入流之名而無入流之相也不入色聲香味觸法是名須陀洹須陀洹既不為得果著相即於六塵境界都無染著所以名為須陀洹也須菩提於意云何斯陀含能作是念我得斯陀含果不此佛歷舉四果而徵問之也斯陀含華言一來此人於欲界九品思惑已斷六品更須欲界一度受生故云一來也思惑謂觸念生心也佛呼須菩提而再詰之曰聲聞乘二果名斯陀含證此果者其心以為我今已得斯陀含果否須菩提言不也世尊須菩提以初果之人且不作得果之念況等而上之哉故亦以不也答之何以故斯陀含名一往來而實無往來是名斯陀含言斯陀含所以不存得果之念者何哉盖斯陀含雖有往來之名而心無往來之相是以名為斯陀含也須菩提於意云何阿那含能作是念我得阿那含果不那音羅下同阿那含華言不來此人於欲界九品思惑斷盡不來欲界受生故云不來也佛又呼須菩提而詰之曰聲聞乘三果名阿那含證是果者其心以為我今已得阿那含果否須菩提言不也世尊須菩提以阿那含亦不存得果之念故仍以不也答之何以故阿那含名為不來而實無不來是名阿那含言阿那含所以不存得果之念者何哉盖其名雖謂為不來而心且無不來之相是以名為阿那含也須菩提於意云何阿羅漢能作是念我得阿羅漢道不阿羅漢華言無學此人於三界煩惱悉已斷盡究竟真理無法可學故云無學又阿羅漢將入佛乘故不言果而言道也佛又呼須菩提而詰之曰聲聞乘四果名阿羅漢證是果者其亦以為我今已得阿羅漢道否須菩提言不也世尊須菩提以阿羅漢煩惱斷盡豈更存得道之念故仍以不也答之何以故寔無有法名阿羅漢言阿羅漢所以不存得道之念者何哉盖阿羅漢固得無相之法然寔無得法之心而名之為阿羅漢也世尊若阿羅漢作是念我得阿羅漢道即為著我人眾生壽者須菩提白佛而言若阿羅漢心作是念謂我已得阿羅漢正道則其心已著相既著得道之相即亦猶著我人等四相也又何云阿羅漢哉世尊佛說我得無諍三昧人中最為第一是第一離欲阿羅漢三昧華言正受猶云妙理也須菩提復以自己所得印證於佛故稱世尊而言佛見我與物無諍而稱我為已得無諍三昧於人中最為第一可貴是第一等能脫離五欲之阿羅漢也盖非離欲無諍亦不能進道矣我不作是念我是離欲阿羅漢然佛雖稱我為離欲阿羅漢我寔未甞作是念而云我是離欲阿羅漢也世尊我若作是念我得阿羅漢道世尊則不說須菩提是樂阿蘭那行者行音恨阿蘭那華言無諍須菩提復稱世尊而言我若曾作此念而云我得阿羅漢道者世尊便不說須菩提是喜好無諍之行者矣以須菩提實無所行而名須菩提是樂阿蘭那行無所行之行如字無所行行所無事也言佛所以稱須菩提得無諍三昧者以須菩提雖有修證寔亦行所無事耳故佛說我是喜好無諍之行者然我寔無喜好之心存於中也莊嚴淨土分第十法以無得為得心以無住為住清淨自然並不著相執有此為莊嚴自心淨土非若設像供養之為莊嚴也佛告須菩提於意云何佛欲以己之往事示人使之堅信故告須菩提曰於汝意中以為何如耶如來昔在然燈佛所於法有所得不此如來佛自謂也然燈佛釋迦之師也言如我昔日在本師處聞法頓證其時本師果有秘法授我而真有所得乎不也世尊須菩提以佛佛相傳雖有得法之名然皆自修自度非有秘法與人不假修為便堪證果故即以不也答之如來在然燈佛所於法寔無所得言佛昔在本師處雖云得法其寔得無所得耳須菩提於意云何菩薩莊嚴佛土不土讀作杜盖東西異音耳佛又恐人不求見性專以造寺塑像種種裝飾而為莊嚴故呼須菩提而詰之曰汝意以為何如耶諸菩薩曾以外相莊嚴而為莊嚴佛土否不也世尊須菩提以諸菩薩決不以外相莊嚴而為莊嚴自心佛土故以不也答之何云故莊嚴佛土者即非莊嚴是名莊嚴夫我所謂菩薩不事外相莊嚴者何故哉盖莊嚴佛土者非有莊嚴之迹乃各自淨其心是則名之為莊嚴耳是故須菩提諸菩薩摩訶薩應如是生清淨心佛以須菩提所言莊嚴之意深契其旨故即是之而又呼之曰須知諸菩薩及大菩薩等應以所云如是之法而生其清淨之心清淨心者謂心不起絲毫雜念也生字尤為要妙佛恐學人但求心淨一向沉空守寂宛如槁木死灰則又落偏枯而非中道故特云生清淨心便覺活潑潑地不應住色生心不應住聲香味觸法生心言菩薩之心既不宜落空亦不宜附物雖曰生心不當於六塵上有所粘著也應無所住而生其心盖不惟不應於塵境上生心即一切境緣均不應有所粘著此為無住生心之妙法耳我佛教人如此入細千古傳心妙訣無逾於此可謂要言不煩宜乎六祖一聞此語便爾悟入吾輩可弗勉諸須菩提譬如有人身如須彌山王於意云何是身為大不須彌山高出天外間隔四天下其大無比故稱山王佛欲人自見法身之大故設辭以問須菩提曰假如有人其色身如須彌山王之大汝意以為何如是人之身亦曾為大否須菩提言甚大世尊何以故佛說非身是名大身須菩提知佛問意而言若以色身而論則如須彌之身可云甚大矣然所謂大者何故哉是特以色身言之耳若佛所謂法身者廣大如虗空非有相非無相非色身之身故云非身是則可名為大身耳豈區區色身之比哉無為福勝分第十一謂以七寶行施固雖甚多但享世間頑福其福有量若持經化導終至成道永享無為真福其福轉勝也須菩提如恒河中所有沙數如是沙等恒河於意云何是諸恒河沙甯為多不佛又申言持說之獲福勝於寶施故呼須菩提而詰之曰假如以恒河中所有之沙數一沙復作一恒河汝意以為此沙數恒河之沙曾為多否此極言其無量也恒河西域河名週四十里其沙甚細佛每於此說法故欲言多輙取河沙以為喻甯猶曾也須菩提言甚多世尊須菩提以恒沙之多何可數計故以甚多答之但諸恒河尚多無數何況其沙言但計一河沙數之恒河其多且已無數何況眾河之沙而能計其數哉須菩提我今實言告汝若有善男子善女人以七寶滿爾所恒河沙數三千大千世界以用布施得福多不佛以須菩提言眾恒河沙之多不可數計故呼之曰我今以真實之言告汝設有善信男女於此以七寶布滿爾頃所謂眾河沙數之大千世界以為布施其所得福曾為多否第八分中曾言大千世界寶施不及持說之福今復言眾河沙數之大千世界寶施則其多尤難計量而獲福亦更無窮矣佛屢設喻極顯持說之勝耳須菩提言甚多世尊須菩提以設有如許寶施獲福豈有限量故以甚多答之佛告須菩提若善男子善女人於此經中乃至授持四句偈等為他人說而此福德勝前福德佛以寶施獲福終不及持說之勝故告須菩提曰若有善信男女受持此經中章句乃至僅持四句偈等且與人解說使之信受此人所得福德已超勝於前寶施之福德矣夫持說之殊勝若此人胡不勉而行之尊重正教分第十二言持說此經之處自天人以迄修羅並皆呵護是彼等亦知尊重正教也復次須菩提隨說是經乃至四句偈等此承上章申言持說之勝不惟獲福無量故復呼須菩提曰若人隨意解說此經之章句或少而至四句偈者當知此處一切世間天人阿修羅皆應供養如佛塔廟供養並去聲阿修羅有四種一屬天趣能與帝釋爭衡一屬人趣一屬鬼趣一屬畜生趣藏佛舍利之處為塔奉佛形像之處為廟言持說此經之人之處所有諸世間中若天若人若修羅等皆當恭敬供養如奉佛之塔廟焉盖彼等之所供養者以此無上希有之法難見難逢故猝遇之而生欽敬也何況有人盡能受持讀誦對文曰讀背文曰誦夫隨說經中章句者天人且如許尊重況復有人而能持誦全經其為崇奉又當何如耶須菩提當知是人成就最上第一希有之法是人既能持誦全經必能研求厥旨自可由之入道佛故呼須菩提曰汝當知此持經之人以信受此經之故必能成就夫最尊最上第一等世間所少有之妙法而功不唐捐焉顧不偉哉若是經典所在之處即為有佛若尊重弟子言若此經所在之處雖無佛而即為有佛若持誦此經之人即為所應尊重之大弟子焉其為尊重何如耶則此經之殊勝誠非淺鮮見聞之者可不敬信受持以期證悟哉如法受持分第十三言此經之殊勝既得聞之自當敬信受持然受持而不知如是生心之法不免入於歧途故云如法受持也爾時須菩提白佛言世尊當何名此經我等云何奉持是時須菩提聞佛說此經之勝妙因不禁欣喜而白佛云世尊當以何名名此經我等得聞此經自當信受奉持而奉持之法未審云何佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持佛以須菩提請問經名及受持之法得其要領故告之曰是經名之為金剛般若波羅蜜以喻若具堅剛之志以修行則智慧自生乘此智慧直達涅槃彼岸所以命此名者欲令汝等顧名思義當秉此義而奉持之則庶乎幾矣所以者何須菩提佛說般若波羅蜜即非般若波羅蜜佛所說經處處不落實迹是其心法要妙如上說奉持之法又恐人著相生執便非中道了義故急折之曰我之所以教汝等奉持之法者何哉須菩提當知佛說般若波羅蜜之旨但得心知即是並非教人常著一般若波羅蜜之見於胸中也此意最宜辨明所謂毫釐有差天地懸隔也須菩提於意云何如來有所說法不佛欲廣離相之意故呼須菩提而詰之曰於汝意中以為何如耶如來常為汝等說法果有實法與人否須菩提白佛言世尊如來無所說須菩提聞佛問辭審知說法者無法可說之義故即白佛云世尊如來雖云說法其實說無所說耳須菩提於意云何三千大千世界所有微塵是為多不此如來欲人知塵界色身均皆幻妄不實雖復美大與真性中總無關涉故呼須菩提而詰之曰於汝意中以為何如耶若大千世界中所有微塵其數曾為多否夫世界微塵豈有限量佛盖取以喻人妄念之多也須菩提言甚多世尊須菩提以大千世界微塵多不可量故以甚多答之須菩提諸微塵如來說非微塵是名微塵須菩提既答佛微塵甚多之語佛又呼其名曰是諸微塵佛皆不著微塵之相塵本與我無涉故說為非微塵然塵相宛然是亦名之為微塵而已盖喻妄念雖多若不起心隨之則妄念亦不能為礙矣如來說世界非世界是名世界盖自佛而觀不惟塵埃微物為幻妄即大而世界亦是人心一念造成劫火燒時終須壞滅故云如來說世界亦不著世界之相即非世界矣然世界宛然是亦名之為世界而已須菩提於意云何可以三十二相見如來不佛又呼須菩提曰於汝意以為何如耶如來色身有三十二種相好見此相者可云真見如來否盖言如來色身雖復種種相好亦屬幻妄故不當以此見如來也筏喻經云三十二相者一身清淨二身端直持重進止如象王三身不傾動四客儀俻五骨際如鈎鎻六毛孔出異香七身邊光一丈八光照身而行九頂有肉髻十髮長好十一髮青紺色不亂十二面俱滿足如滿月十三眉如初月十四眉間白毫相十五眼修廣十六鼻高不露孔十七耳輪輻相垂成十八頰輔如獅子十九口出無上香二十舌廣長薄二十一一音報眾聲二十二兩手過膝二十三膝骨堅圓二十四足下千輻輪相二十五行時足離地四寸印文現二十六行步如鵞王二十七住處安無能動二十八威鎮一切二十九說法不著相三十等視眾生三十一隨眾生意和悅與語三十二一切惡心眾生見即和悅此皆奇相也他說互有異同不也世尊不可以三十二相得見如來須菩提悟無相之旨聞佛問辭即以不也答之而言寔不可僅以三十二相而見如來也何以故如來說三十二相即是非相是名三十二相夫不可僅以色身見佛者何哉以如來所說三十二相者乃色身幻相而非法身真相是特名之為三十二相也須菩提若有善男子善女人以恒河沙等身命布施佛前言寶施雖多不及持經功德盖寶施者外財也獲福尚有限量今言善男女等更以恒沙身命而為布施此為內財人所難捨則其獲福尤無量矣盖設喻重重極顯持說之殊勝也大慈悲語曷可忽諸若復有人於此經中乃至授持四句偈等為他人說其福甚多言以身命布施其獲福固遠勝寶施者矣然若有人而能受持此經中章句或少而僅持四句偈等既自行持又復宣說化導則自他俱利頓階證悟其所獲福較命施者而甚多矣非殊勝哉離相寂滅分第十四言行人於一切處而離諸幻相則真性寂然滅盡諸有斯心體圓明永臻常定矣爾時須菩提聞說是經深解義趣涕淚悲泣而白佛言希有世尊解音懈後同解猶悟也是時須菩提聞佛說此經反覆明辨深悟此中妙義既傷聞法之遲暮猶幸至道之親承正如浪子還鄉重瞻慈父衣珠故在客作徒勞迴思苦海無邊浮沉長劫故不覺涕泗橫流頓生悲感而白於佛歎言舉世所少有者我世尊也佛說如是甚深經典我從昔來所得慧眼未曾得聞如是之經曾音層言佛說如是極深妙之經典我雖從昔日以來已得慧眼能觀天上及界外無不了然然終未嘗得聞佛今所說如是之經為極深而最簡又何幸而得聞之哉世尊若復有人得聞是經信心清淨則生實相須菩提言以如是之深經自既聞之矣又稱世尊而言若更有人得聞是經深信不疑心常清淨即能生夫寔相寔相者無相也當知是人成就第一希有功德言是人既心生寔相吾知其必證菩提妙果而可云成就第一等最希有之功德焉世尊是實相者則是非相是故如來說名寔相此須菩提解說寔相之義故稱世尊而言實相即是非相以明真空無相非一切色相之謂是則如來說名寔相也世尊我今得聞如是經典信解受持不足為難須菩提慮後之修行者去佛漸遠正法難聞故復稱世尊而言我今親承佛訓得聞此經又得佛詳加剖晰毫無疑滯則我之信解受持自不為難矣若當來世後五百歲其有眾生得聞是經信解受持是人則為第一希有五百歲說現前言若於將來之世最後五百歲中若有眾生於本所不聞者以有緣故忽聞此經而能信解受持不滋疑懼當知是人夙根深厚便為第一希有之人矣何以故此人無我相人相眾生相壽者相所謂是人為第一希有者何哉盖了悟此經深生信解便明無相之旨則其心必無我人等四相也所以者何我相即是非相人相眾生相壽者相即是非相所以謂是人悟無相者何哉若有我相之見即非真知寔相矣既知我相非相則人相等三亦非寔相也明矣何以故離一切諸相則名諸佛夫以我人等為非相者何哉盖行人貴見相而離相若不著諸相是人雖未證佛果終當成就是即可名之為諸佛矣佛告須菩提如是如是佛以須菩提所言深合經旨故告之曰如是如是所以深許之也若復有人得聞是經不驚不怖不畏當知是人甚為希有言若更有人而得聞是經其心不驚怖不畏懼者則其解行甚深逈超儕輩是人殊為世間所希有者矣何以故須菩提如來說第一波羅密即非第一波羅密是名第一波羅密波羅密有六種謂持戒布施忍辱精進禪定智慧般若解脫第一波羅密即般若也以此經正說般若故稱第一佛言我云是人為希有者何哉盖大乘正法決非小根器人所能承載須菩提當知離諸名相者不惟我人等相為應離乃至如來所說第一波羅密法究係說無所說則亦非波羅密矣但如來說法熾然何嘗緘默既為人說此波羅密法是即名之為第一波羅密耳須菩提忍辱波羅密如來說非忍辱波羅密佛以般若波羅密既不可以相求之則諸波羅密皆不應有所取執也明矣然諸波羅密中惟忍辱為最難故呼須菩提而告之曰忍辱波羅密如來亦不以難行之故而生著相也何以故須菩提如我昔為歌利王割截身體此如來以己昔行忍辱之行以證之也言我所謂不著忍辱之相者何哉如我昔日曾受歌利王割截身體此為人所難忍者也而我能忍之歌利華言極惡佛於宿世作仙人時修忍辱行山中宴坐遇歌利王出遊王時方憩息醒而不見左右宮女入山見眾女圍繞仙人禮拜王大怒曰何以姿情觀我女色仙人曰我不貪女色王曰云何見色不貪仙人曰持戒王曰何名持戒仙人曰忍辱即是王乃用刀割仙人身問曰痛否仙曰不痛王即節節支解之問曰還嗔恨否仙曰我尚非有何有嗔恨時四天王大怒雨石以警之王乃止歌利王即後之憍陳如佛初成道時所度者也我於爾時無我相無人相無眾生相無壽者相言我爾時雖行此難行之事然自我視之如以湯沃雪與心性無與盖緣胸中無四相之見存焉耳何以故我於往昔節節支解時若有我相人相眾生相壽者相應生嗔恨盖我之所能忍辱者何哉緣空無我相故耳若於支解肢節時而心有我人等相則必不能忍受而生嗔恨矣嗔怒聲也須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無眾生相無壽者相佛又呼須菩提而告之曰我念過去之世於五百世前已曾作忍辱仙人行忍辱行我於彼時即無四相之見以明修此苦行非止一世寔欲勉人勿以難忍之行而遂生嗔恨致令修不能成也盖六波羅密惟此為難此能順受餘即易為佛故於此特言之是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心言以是故須菩提當知菩薩之人其心應離一切色相而發此無上正等正覺之心者庶與斯道方有相應分不應住色生心不應住聲香味觸法生心應生無所住心若心有住則為非住言發此無上道心者設遇六塵境界皆不宜住心生執然百物不思心易昏沉故應不住境緣而心地仍要清明斯為要訣若心忽緣外物便非住心正軌即為非所住而住矣是故佛說菩薩心不應住色布施是以佛說菩薩之心一切無住雖行布施而不住色相是為行所無事不自居功亦不望報也須菩提菩薩為利益一切眾生應如是布施須菩提當知菩薩行施雖不生取著然普願眾生離苦得樂使之獲益乃合菩薩法式但其心惟任自然不假勉強方為如是行施耳如來說一切諸相即是非相又說一切眾生即非眾生盖自佛眼而觀凡一切色相皆屬幻妄不寔故云非相及觀一切眾生與我同體何分彼此故云非眾生盖佛心平等非若眾生之偏私自好利欲薰心此生佛之所以異也須菩提如來是真語者實語者如語者不誑語者不異語者須菩提當知我說此經汝等切勿疑議佛戒妄語的係誠言故云真寔語如寔而非欺誑之語不異語者如來說法始終如是也佛語每多重復緣人驟聞正論信心為難故不惜申說再三以誘掖獎勸之也我佛大慈能毋感發須菩提如來所得法此法無實無虗須菩提我今為汝等說此法皆我所昔得汝等不得以此法為寔而生執著亦不得以此法為虗而怠行持惟以如是之心而學如是之法斯可矣須菩提若菩薩心住於法而行布施如人入暗則無所見須菩提菩薩之人固不應住相行施矣然設云我此布施是為如法則為住法行施而生法相便如人處暗中惟見黑暗他無所見也若菩薩心不住法而行布施如人有目日光明照見種種色種上聲若菩薩之心不住於法而行施者則如有目之人又有日光照耀種種色相悉皆明了此所以不應住相而行施也須菩提當來之世若有善男子善女人能於此經受持讀誦佛屢言持經功德之勝以勵人故呼須菩提曰後來世中若有善信男女能持誦此經者其善根為不淺矣則為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德言持誦此經之人我以佛之智慧盡能知見是人或久或暫必得成就無限量無邊際之大功德焉盖遵信行持功無虗棄終至證果而後已謂非大功德乎持經功德分第十五言持經功德之勝遠超於恒沙身命布施況行之較易而收功甚鉅人胡不自勉而坐失此勝方便哉須菩提若有善男子善女人初日分以恒河沙等身布施中日分復以恒河沙等身布施後日分亦以恒河沙等身布施分去聲初日分寅卯辰時也中日分巳午未時也後日分申酉戌時也此如來更設喻以極顯持說之勝也故呼須菩提曰若有善信男女於此每日三時而皆以恒河沙等身命布施者則視寶施功德不可以同年而語者矣如是無量百千萬億劫以身布施言是人每日三時而以恒河沙命布施復經無量長劫則所施身命不可計量而獲福亦更無量矣此固必無之事即使有之終屬有為法徒享世間頑福與心性毫無交涉故下文復顯持說之勝若復有人聞此經典信心不逆其福勝彼言彼命施者獲福固無量矣然若有人而得聞此經信心不疑則雖未行持而所得福德已超勝於彼矣何況書寫受持讀誦為人解說夫聞經生信已勝身命布施況復鈔寫持誦又為人解說者乎則其獲福之多自不待言矣須菩提以要言之是經有不可思議不可稱量無邊功德要平聲要約也言約而言之此經寔有不可以心思計議不可以秤稱斗量有如是之無邊功德焉如來為發大乘者說為發最上乘者說然如來此經為發心求大乘法者所說為求最上乘者而說非為下劣凡夫而說也盖其根行淺薄縱聞勝法難發信心所謂下士聞道大笑之良可歎也若有人能受持讀誦廣為人說如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德若更有人能持誦此經遍為人解說而化導之我皆知見是人必能成就難稱量無邊際不可思議之功德焉盖極形其莫可比數也如是人等則為荷擔如來阿耨多羅三藐三菩提荷去聲荷負也言此持說之人即為負荷擔當如來無上正法者矣何以故須菩提若樂小法者著我見人見眾生見壽者見則於此經不能聽受讀誦為人解說所謂持說之人即為能荷如來正法者何哉須菩提當知若樂小乘法者則於人我等見成敵兩立是則四相熾然而於此甚深經典反生疑謗既不能信受行持自不堪為人解說良以己眼不明遂至誤入岐途而失此勝妙功德耳須菩提在在處處若有此經一切世間天人阿修羅所應供養須菩提當知若樂小法者於此無上正法既不能行持獲益矣設有大心眾生正信堅固隨其所在之處苟有此經則經之所在彼一切世間天人以迄修羅皆應恭敬供養者矣當知此處則為是塔皆應恭敬作禮圍繞以諸華香而散其處葉即花字言此經所在之處雖非塔而即為是塔若天人修羅見於此處便皆尊重恭敬禮拜而圍繞之且以名華異香布散其處其為尊異又何如耶盖佛菩薩說法之處常有天人散華其上以示䖍潔故云
